name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Generate Prisma Client
      run: npx prisma generate

    - name: Run linter
      run: npm run lint || true

    - name: Type check
      run: npx tsc --noEmit || true

    - name: Build Next.js
      run: npx next build
      env:
        DATABASE_URL: "postgresql://ci_user:ci_pass@localhost:5432/ci_db?schema=public"
        DIRECT_URL: "postgresql://ci_user:ci_pass@localhost:5432/ci_db?schema=public"
        JWT_SECRET: "ci_jwt_secret_key_123456789_super_secure"

